name: Release

# Builds and publishes installers when a version tag is pushed (ARCHITECTURE.md §12):
#   git tag v0.1.0 && git push origin v0.1.0
# Produces: .dmg (macOS arm64 + x64), .msi/.exe (Windows), .AppImage + .deb (Linux),
# attached to a draft GitHub Release for a final once-over before publishing.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # arm64
            args: "--target aarch64-apple-darwin --bundles dmg"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin --bundles dmg"
          - platform: ubuntu-22.04
            args: "--bundles appimage,deb"
          - platform: windows-latest
            args: "--bundles msi"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (webkit2gtk et al.)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build and attach to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "BranchKit ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for what's new."
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
